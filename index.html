<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAAR Strategies — Arcade Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0c29;
  --bg2: #1a1640;
  --card: #1e1a4a;
  --border: #3a3470;
  --text: #f0eeff;
  --muted: #8880bb;
  --accent: #ff6b6b;
  --yellow: #ffd93d;
  --green: #6bcb77;
  --blue: #4d96ff;
  --purple: #c77dff;
  --pink: #ff6fd8;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(2px 2px at 35% 15%, rgba(255,220,100,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 65% 85%, rgba(180,140,255,0.3) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1.5rem; }

/* TITLE */
#titleScreen { text-align: center; gap: 1.5rem; }
.game-logo {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.8rem, 8vw, 5rem);
  line-height: 1;
  background: linear-gradient(135deg, var(--yellow), var(--pink), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(255,200,80,0.3)); }
  50% { filter: drop-shadow(0 0 40px rgba(255,200,80,0.6)); }
}
.game-sub { font-size: 1rem; color: var(--muted); font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
.name-input-wrap { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 340px; }
.name-input-wrap label { font-size: 0.82rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.name-field {
  font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
  background: var(--card); border: 2px solid var(--border); border-radius: 14px;
  color: var(--text); padding: 0.8rem 1.2rem; outline: none; transition: border-color 0.2s; text-align: center;
}
.name-field:focus { border-color: var(--yellow); }
.filter-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; max-width: 500px; }
.filter-pill {
  background: var(--card); border: 2px solid var(--border); color: var(--muted);
  font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 800;
  padding: 0.4rem 0.9rem; border-radius: 20px; cursor: pointer; transition: all 0.18s; letter-spacing: 0.04em;
}
.filter-pill:hover, .filter-pill.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,217,61,0.1); }
.btn-start {
  font-family: 'Fredoka One', cursive; font-size: 1.4rem; letter-spacing: 0.05em;
  background: linear-gradient(135deg, var(--accent), var(--pink)); color: white;
  border: none; border-radius: 16px; padding: 1rem 3rem; cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,107,107,0.4); transition: all 0.2s;
  animation: btnBounce 2s ease-in-out infinite;
}
@keyframes btnBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.btn-start:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 10px 32px rgba(255,107,107,0.6); animation: none; }

/* HUD */
#gameScreen { padding: 0; justify-content: flex-start; }
.hud {
  width: 100%; background: var(--bg2); border-bottom: 2px solid var(--border);
  padding: 0.8rem 1.5rem; display: flex; align-items: center; gap: 1rem;
  flex-wrap: wrap; position: sticky; top: 0; z-index: 10;
}
.hud-lives { display: flex; gap: 4px; font-size: 1.3rem; }
.heart { transition: all 0.3s; display: inline-block; }
.heart.lost { filter: grayscale(1); opacity: 0.3; transform: scale(0.8); }
.hud-score { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--yellow); text-shadow: 0 0 10px rgba(255,217,61,0.4); }
.hud-streak { font-size: 0.82rem; font-weight: 800; color: #ff9f43; display: none; }
.hud-streak.show { display: block; animation: streakPop 0.3s ease; }
@keyframes streakPop { 0% { transform: scale(0.5); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
.timer-wrap { margin-left: auto; position: relative; width: 44px; height: 44px; }
.timer-svg { transform: rotate(-90deg); }
.timer-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.timer-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
.timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; font-size: 1rem; }
.hud-badge { font-size: 0.72rem; font-weight: 800; padding: 0.2rem 0.6rem; border-radius: 8px; color: white; letter-spacing: 0.05em; }

/* GAME BODY */
.game-body { width: 100%; max-width: 680px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; display: flex; flex-direction: column; gap: 1.2rem; }
.q-progress { font-size: 0.78rem; font-weight: 800; color: var(--muted); text-align: center; letter-spacing: 0.08em; text-transform: uppercase; }
.q-card {
  background: var(--card); border: 2px solid var(--border); border-radius: 20px;
  padding: 1.8rem; box-shadow: var(--shadow); position: relative; overflow: hidden;
  animation: cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.q-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--strategy-color, var(--accent)); }
.q-card.correct-anim { animation: correctFlash 0.5s ease; }
.q-card.wrong-anim { animation: wrongShake 0.5s ease; }
@keyframes correctFlash {
  0% { border-color: var(--border); }
  30% { border-color: var(--green); box-shadow: 0 0 30px rgba(107,203,119,0.5); }
  100% { border-color: var(--border); }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); border-color: var(--border); }
  15% { transform: translateX(-10px); border-color: var(--accent); }
  30% { transform: translateX(10px); }
  45% { transform: translateX(-7px); }
  60% { transform: translateX(7px); }
  75% { transform: translateX(-4px); border-color: var(--accent); box-shadow: 0 0 20px rgba(255,107,107,0.4); }
}
.q-text { font-size: 1.05rem; font-weight: 700; line-height: 1.7; margin-bottom: 1.3rem; }
.blank-field {
  font-family: 'Fredoka One', cursive; font-size: 0.95rem; color: var(--text);
  background: rgba(255,255,255,0.08); border: 2px solid var(--yellow); border-radius: 8px;
  padding: 0.15rem 0.6rem; min-width: 110px; text-align: center; outline: none; transition: all 0.2s;
}
.blank-field:focus { background: rgba(255,217,61,0.1); box-shadow: 0 0 0 3px rgba(255,217,61,0.2); }
.blank-field.correct { border-color: var(--green); background: rgba(107,203,119,0.15); color: var(--green); }
.blank-field.wrong { border-color: var(--accent); background: rgba(255,107,107,0.15); color: var(--accent); }
.blank-field.revealed { border-color: var(--purple); background: rgba(199,125,255,0.15); color: var(--purple); }
.section-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
.word-bank { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.3rem; }
.word-chip {
  background: rgba(255,255,255,0.07); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 0.35rem 0.8rem; font-family: 'Fredoka One', cursive; font-size: 0.85rem;
  color: var(--text); cursor: pointer; transition: all 0.18s; user-select: none;
}
.word-chip:hover { border-color: var(--blue); color: var(--blue); background: rgba(77,150,255,0.1); transform: translateY(-2px); }
.word-chip.used { opacity: 0.25; pointer-events: none; text-decoration: line-through; }
.hint-row { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 1rem; }
.hint-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 8px; color: var(--muted);
  font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 800; padding: 0.3rem 0.8rem; cursor: pointer; transition: all 0.18s;
}
.hint-btn:hover { border-color: var(--blue); color: var(--blue); }
.hint-text { font-size: 0.82rem; color: var(--blue); font-style: italic; opacity: 0; transition: opacity 0.3s; }
.hint-text.show { opacity: 1; }
.action-row { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
.btn-game { font-family: 'Fredoka One', cursive; font-size: 1rem; letter-spacing: 0.05em; padding: 0.65rem 1.6rem; border-radius: 12px; border: none; cursor: pointer; transition: all 0.18s; }
.btn-check { background: linear-gradient(135deg, var(--blue), var(--purple)); color: white; box-shadow: 0 4px 16px rgba(77,150,255,0.3); }
.btn-check:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(77,150,255,0.5); }
.btn-next { background: linear-gradient(135deg, var(--green), #4be08a); color: white; box-shadow: 0 4px 16px rgba(107,203,119,0.3); display: none; }
.btn-next:hover { transform: translateY(-2px); }
.btn-skip { background: none; border: 1.5px solid var(--border); color: var(--muted); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.82rem; padding: 0.65rem 1rem; border-radius: 12px; cursor: pointer; }
.btn-skip:hover { border-color: var(--muted); }
.feedback-msg { font-family: 'Fredoka One', cursive; font-size: 1rem; margin-left: auto; display: none; }
.feedback-msg.correct { color: var(--green); display: block; }
.feedback-msg.wrong { color: var(--accent); display: block; }
.explanation-box {
  margin-top: 1rem; background: rgba(107,203,119,0.08); border: 1.5px solid rgba(107,203,119,0.3);
  border-radius: 12px; padding: 0.9rem 1.1rem; font-size: 0.85rem; color: #a8f0b4;
  line-height: 1.55; display: none;
}
.explanation-box.show { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* SCORE POP */
.score-pop { position: fixed; font-family: 'Fredoka One', cursive; font-size: 1.6rem; pointer-events: none; z-index: 999; animation: scoreFly 1s ease forwards; }
@keyframes scoreFly { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.3); } }

/* GAME OVER */
#gameOverScreen { text-align: center; gap: 1.2rem; }
.go-title { font-family: 'Fredoka One', cursive; font-size: clamp(2.5rem, 8vw, 4rem); text-shadow: 0 0 30px rgba(255,107,107,0.5); animation: goIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes goIn { from { transform: scale(0.3) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
.go-score { font-family: 'Fredoka One', cursive; font-size: 3.5rem; color: var(--yellow); text-shadow: 0 0 20px rgba(255,217,61,0.4); }
.go-stats { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
.go-stat { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 0.8rem 1.4rem; text-align: center; min-width: 90px; }
.go-stat-num { font-family: 'Fredoka One', cursive; font-size: 1.8rem; color: var(--purple); display: block; }
.go-stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 800; }

/* LEADERBOARD */
.leaderboard { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 1.2rem; width: 100%; max-width: 400px; }
.lb-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--yellow); margin-bottom: 0.8rem; text-align: center; }
.lb-entry { display: flex; align-items: center; gap: 0.8rem; padding: 0.5rem 0.6rem; border-radius: 10px; font-weight: 700; font-size: 0.88rem; transition: background 0.2s; }
.lb-entry:hover { background: rgba(255,255,255,0.05); }
.lb-entry.me { background: rgba(255,217,61,0.08); border: 1px solid rgba(255,217,61,0.2); }
.lb-rank { font-family: 'Fredoka One', cursive; font-size: 1rem; width: 28px; text-align: center; }
.lb-name { flex: 1; }
.lb-score { font-family: 'Fredoka One', cursive; color: var(--yellow); }
.rank-1 { color: #ffd700; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; }
.btn-play-again {
  font-family: 'Fredoka One', cursive; font-size: 1.3rem;
  background: linear-gradient(135deg, var(--accent), var(--pink)); color: white;
  border: none; border-radius: 16px; padding: 0.9rem 2.5rem; cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,107,107,0.4); transition: all 0.2s;
}
.btn-play-again:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(255,107,107,0.6); }

/* REACTION */
.big-reaction { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 200; pointer-events: none; }
.reaction-emoji { font-size: 8rem; animation: reactionPop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; opacity: 0; }
@keyframes reactionPop { 0% { opacity: 0; transform: scale(0.2); } 50% { opacity: 1; transform: scale(1.2); } 80% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.8); } }

@media (max-width: 500px) {
  .q-card { padding: 1.2rem; }
  .blank-field { min-width: 85px; }
  .hud { padding: 0.6rem 1rem; gap: 0.6rem; }
}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="titleScreen" class="screen active">
  <div class="game-logo">STAAR QUEST</div>
  <div class="game-sub">Strategies Edition</div>
  <div class="name-input-wrap">
    <label>Your Name</label>
    <input class="name-field" id="nameField" type="text" placeholder="Enter your name..." maxlength="20" />
  </div>
  <div>
    <div class="section-label" style="text-align:center;margin-bottom:0.6rem">Choose Strategy</div>
    <div class="filter-grid" id="filterGrid"></div>
  </div>
  <button class="btn-start" onclick="startGame()">▶ PLAY NOW</button>
  <div style="width:100%;max-width:400px">
    <div class="leaderboard">
      <div class="lb-title">🏆 High Scores</div>
      <div id="titleLB"></div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="hud">
    <div class="hud-lives" id="hudLives"></div>
    <div class="hud-badge" id="stratBadge"></div>
    <div class="hud-score">⭐ <span id="hudScore">0</span></div>
    <div class="hud-streak" id="hudStreak"></div>
    <div class="timer-wrap">
      <svg class="timer-svg" width="44" height="44" viewBox="0 0 44 44">
        <circle class="timer-bg" cx="22" cy="22" r="18"/>
        <circle class="timer-fill" id="timerArc" cx="22" cy="22" r="18" stroke-dasharray="113" stroke-dashoffset="0" stroke="var(--green)"/>
      </svg>
      <div class="timer-num" id="timerNum">15</div>
    </div>
  </div>
  <div class="game-body">
    <div class="q-progress" id="qProgress"></div>
    <div class="q-card" id="qCard">
      <div class="q-text" id="qText"></div>
      <div class="section-label">Word Bank</div>
      <div class="word-bank" id="wordBank"></div>
      <div class="hint-row">
        <button class="hint-btn" onclick="showHint()">💡 Hint (-3pts)</button>
        <span class="hint-text" id="hintText"></span>
      </div>
      <div class="action-row">
        <button class="btn-game btn-check" id="checkBtn" onclick="checkAnswer()">CHECK ✓</button>
        <button class="btn-game btn-next" id="nextBtn" onclick="nextQuestion()">NEXT →</button>
        <button class="btn-skip" onclick="skipQuestion()">Skip</button>
        <span class="feedback-msg" id="feedbackMsg"></span>
      </div>
      <div class="explanation-box" id="explanationBox"></div>
    </div>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameOverScreen" class="screen">
  <div class="go-title" id="goTitle">GAME OVER</div>
  <div class="go-score" id="goScore">0</div>
  <div class="go-stats" id="goStats"></div>
  <div style="width:100%;max-width:400px">
    <div class="leaderboard">
      <div class="lb-title">🏆 High Scores</div>
      <div id="endLB"></div>
    </div>
  </div>
  <button class="btn-play-again" onclick="goBack()">PLAY AGAIN</button>
</div>

<div class="big-reaction" id="reactionOverlay" style="display:none">
  <div class="reaction-emoji" id="reactionEmoji"></div>
</div>

<script>
const STRATEGY_COLORS = {
  "MIND MAP":"#4d96ff","SWBST":"#ff6b6b","DATE":"#c77dff",
  "SIFT":"#6bcb77","SDDS":"#ffd93d","RISE UP":"#ff9f43",
  "SALT":"#ff6fd8","TEXT":"#00d2d3","IBBC":"#ee5a24"
};

const ALL_QUESTIONS = [
  {strategy:"MIND MAP",template:"When reading informational text, the MIND MAP strategy helps you identify the ___ topic and important ___ in each section.",blanks:["main","details"],wordBank:["main","details","title","paragraphs","headings","ideas"],hint:"Think about the whole text's big idea and what supports it.",explanation:"MIND MAP = identify the <strong>main</strong> topic in the center, then branch out the <strong>details</strong>."},
  {strategy:"MIND MAP",template:"In MIND MAP, subheadings branch off the ___ topic, and each branch can have its own important ___.",blanks:["main","idea"],wordBank:["main","idea","paragraph","theme","summary","title"],hint:"The center of a mind map holds the big picture.",explanation:"The <strong>main</strong> topic sits at the center; each subheading branches with its own <strong>idea</strong>."},
  {strategy:"SWBST",template:"SWBST stands for Somebody, Wanted, But, ___, Then.",blanks:["So"],wordBank:["So","Since","Still","See","Start"],hint:"It's the step after 'But' — what happens as a result?",explanation:"SWBST = Somebody / Wanted / But / <strong>So</strong> / Then."},
  {strategy:"SWBST",template:"In SWBST, the 'But' column describes the ___ or problem that gets in the character's way.",blanks:["conflict"],wordBank:["conflict","solution","theme","setting","climax","mood"],hint:"The 'but' is what stops the character from getting what they want.",explanation:"The <strong>conflict</strong> is the obstacle — captured in the 'But' column."},
  {strategy:"SWBST",template:"The 'Then' in SWBST describes the ___ or outcome after the conflict is resolved.",blanks:["resolution"],wordBank:["resolution","climax","flashback","theme","foreshadowing","mood"],hint:"This is how the story ends.",explanation:"The <strong>resolution</strong> is the story's outcome — what happens after the conflict."},
  {strategy:"DATE",template:"DATE stands for Dialogue, Actions, Thoughts and tone, and ___.",blanks:["Emotions"],wordBank:["Emotions","Evidence","Examples","Events","Effects","Explanations"],hint:"The last letter is inferred from what characters say and do.",explanation:"DATE = Dialogue / Actions / Thoughts and tone / <strong>Emotions</strong>."},
  {strategy:"DATE",template:"In the DATE strategy, you infer a character's ___ from their actions and dialogues.",blanks:["emotions"],wordBank:["emotions","setting","theme","plot","conflict","structure"],hint:"Authors don't always tell you how a character feels.",explanation:"The E in DATE = <strong>emotions</strong>, inferred from what characters say and do."},
  {strategy:"SIFT",template:"SIFT stands for Structure, Imagery, Figurative Language, and ___.",blanks:["Theme and Tone"],wordBank:["Theme and Tone","Text Evidence","Topic and Title","Thoughts and Tone"],hint:"The last letter asks: What is the speaker's message and attitude?",explanation:"SIFT = Structure / Imagery / Figurative Language / <strong>Theme and Tone</strong>."},
  {strategy:"SIFT",template:"When using SIFT, the 'I' asks you to find details that appeal to the five ___.",blanks:["senses"],wordBank:["senses","stanzas","syllables","speakers","structures","symbols"],hint:"See, hear, taste, smell, feel.",explanation:"The I in SIFT = Imagery — language that appeals to the five <strong>senses</strong>."},
  {strategy:"SIFT",template:"In SIFT, the 'S' for Structure asks you to notice line breaks, stanzas, and ___ choices the author made.",blanks:["punctuation"],wordBank:["punctuation","rhyme scheme","meter","symbolism","alliteration","diction"],hint:"Look at how the poem is physically arranged on the page.",explanation:"Structure in SIFT includes line breaks, stanzas, capitalization, repetition, and <strong>punctuation</strong>."},
  {strategy:"SDDS",template:"When reading drama, SDDS tells you to highlight the ___ of the scene, like 'SCENE 1. In an old abandoned house...'",blanks:["setting"],wordBank:["setting","conflict","theme","climax","tone","mood"],hint:"This tells you when and where the scene takes place.",explanation:"The second S in SDDS = <strong>Setting</strong> — always highlight where and when drama takes place."},
  {strategy:"SDDS",template:"Stage directions in drama are usually written in ___ and describe what characters physically do.",blanks:["parentheses"],wordBank:["parentheses","quotation marks","bold","italics","brackets","all caps"],hint:"Example: (She sits calmly)",explanation:"<strong>Parentheses</strong> are used for stage directions — e.g., (She sits calmly)."},
  {strategy:"RISE UP",template:"The first step in RISE UP is to ___ and annotate the text before answering questions.",blanks:["read"],wordBank:["read","highlight","skim","summarize","rewrite","scan"],hint:"You can't answer well if you haven't done this first.",explanation:"RISE UP begins with <strong>Read</strong> and annotate — always engage with the text first."},
  {strategy:"RISE UP",template:"In RISE UP, after searching for text evidence, you should ___ wrong answer choices before picking the best one.",blanks:["eliminate"],wordBank:["eliminate","circle","rewrite","underline","ignore","guess"],hint:"Cross off what can't be right first.",explanation:"The E in RISE UP = <strong>Eliminate</strong> wrong choices."},
  {strategy:"RISE UP",template:"RISE UP says to use the ___ when you're unsure about a question, so you can come back to it.",blanks:["flag"],wordBank:["flag","process","timer","highlighter","pencil","eraser"],hint:"It's a tool on the STAAR digital test.",explanation:"The U in RISE UP = Use the <strong>flag</strong> — mark uncertain questions and revisit them."},
  {strategy:"SALT",template:"SALT stands for Special Word, Action, ___, and Topic.",blanks:["Location"],wordBank:["Location","Literature","Language","Lines","Literal","Logic"],hint:"The L asks: Where in the text can I find the answer?",explanation:"SALT = Special Word / Action / <strong>Location</strong> / Topic."},
  {strategy:"SALT",template:"In SALT, the 'S' (Special Word) tells you to watch for words like '___ ', 'Select TWO', or 'only' in a question.",blanks:["except"],wordBank:["except","always","never","mostly","mainly","often"],hint:"This word flips the question — what is NOT true.",explanation:"The word <strong>except</strong> flips the whole direction of the question."},
  {strategy:"SALT",template:"The 'T' in SALT stands for ___, which is the 'heart' of what the question is really asking.",blanks:["Topic"],wordBank:["Topic","Tone","Theme","Thesis","Text","Title"],hint:"Ask yourself: what is this question actually about?",explanation:"The <strong>T</strong>opic is the core focus of the question."},
  {strategy:"TEXT",template:"In the TEXT strategy for SCR, the 'E' stands for ___, where you cite sentences from the text.",blanks:["Evidence"],wordBank:["Evidence","Explanation","Example","Effect","Elaboration","Emphasis"],hint:"Use 'According to...' to introduce it.",explanation:"The E in TEXT = <strong>Evidence</strong> — cite from the text using 'According to...'"},
  {strategy:"TEXT",template:"The second 'X' in TEXT stands for Explanation, where you say 'This ___...' to connect evidence to your thesis.",blanks:["means"],wordBank:["means","shows","proves","tells","supports","states"],hint:"It's the phrase starter that begins your explanation.",explanation:"Explanation uses 'This <strong>means</strong>...' to connect evidence to your thesis."},
  {strategy:"TEXT",template:"The final 'T' in TEXT tells you to ___ or paraphrase your thesis using 'Therefore...'",blanks:["restate"],wordBank:["restate","introduce","replace","summarize","copy","expand"],hint:"You're saying your main idea again, just in new words.",explanation:"The last T = Thesis <strong>Restated</strong> — use 'Therefore...' in your own words."},
  {strategy:"IBBC",template:"IBBC stands for Introduction, Body 1, Body 2, and ___.",blanks:["Conclusion"],wordBank:["Conclusion","Claim","Commentary","Connection","Context","Counterclaim"],hint:"It's the final paragraph of your essay.",explanation:"IBBC = Introduction / Body 1 / Body 2 / <strong>Conclusion</strong>."},
  {strategy:"IBBC",template:"In the IBBC Introduction, your hook should be a ___ — a comparison using 'like' or 'as'.",blanks:["simile"],wordBank:["simile","metaphor","hyperbole","alliteration","theme","claim"],hint:"It's a specific type of figurative language that compares two things.",explanation:"The IBBC hook is a <strong>simile</strong> — a comparison using 'like' or 'as'."},
  {strategy:"IBBC",template:"Each body paragraph in IBBC must include a topic sentence, evidence, and at least ___ sentences of explanation.",blanks:["2"],wordBank:["2","1","3","4","5","6"],hint:"The IBBC guide says 'at least' this many.",explanation:"IBBC requires at least <strong>2</strong> sentences of explanation per body paragraph."},
  {strategy:"IBBC",template:"In IBBC, the ___ paragraph ends with a thesis restated and a final thought.",blanks:["Conclusion"],wordBank:["Conclusion","Introduction","Body 1","Body 2","Hook","Evidence"],hint:"It's the last paragraph.",explanation:"The <strong>Conclusion</strong> restates the thesis and ends with a final thought."},
];

const TIMER_MAX = 15;
const LIVES_MAX = 3;

let state = {
  playerName:'Player', filter:'All', questions:[], current:0,
  score:0, correct:0, lives:LIVES_MAX, streak:0, answered:false,
  selectedBlanks:[], timerVal:TIMER_MAX, timerInterval:null,
};

function getLB() { try { return JSON.parse(localStorage.getItem('staarLB')||'[]'); } catch { return []; } }
function saveLB(name, score) {
  let lb = getLB();
  lb.push({name, score});
  lb.sort((a,b)=>b.score-a.score);
  lb = lb.slice(0,8);
  try { localStorage.setItem('staarLB', JSON.stringify(lb)); } catch {}
  return lb;
}
function renderLB(id, highlight) {
  const lb = getLB();
  const el = document.getElementById(id);
  if (!lb.length) { el.innerHTML='<div style="color:var(--muted);text-align:center;font-size:0.85rem;padding:0.5rem">No scores yet — be the first!</div>'; return; }
  const medals=['🥇','🥈','🥉'];
  el.innerHTML = lb.slice(0,8).map((e,i)=>`
    <div class="lb-entry ${e.name===highlight?'me':''}">
      <span class="lb-rank rank-${i+1}">${medals[i]||'#'+(i+1)}</span>
      <span class="lb-name">${e.name}</span>
      <span class="lb-score">⭐${e.score}</span>
    </div>`).join('');
}

function buildFilters() {
  const strategies = ["All",...Object.keys(STRATEGY_COLORS)];
  document.getElementById('filterGrid').innerHTML = strategies.map(s=>
    `<button class="filter-pill${s===state.filter?' active':''}" onclick="setFilter('${s}',this)">${s}</button>`
  ).join('');
}
function setFilter(f, el) {
  state.filter = f;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function getQuestions() {
  let q = state.filter==='All' ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q=>q.strategy===state.filter);
  return q.sort(()=>Math.random()-0.5);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goBack() { stopTimer(); showScreen('titleScreen'); renderLB('titleLB',''); }

function startGame() {
  const name = document.getElementById('nameField').value.trim()||'Player';
  state.playerName=name; state.questions=getQuestions();
  state.current=0; state.score=0; state.correct=0;
  state.lives=LIVES_MAX; state.streak=0; state.answered=false;
  showScreen('gameScreen');
  renderLives(); renderQuestion();
}

function renderLives() {
  document.getElementById('hudLives').innerHTML =
    Array.from({length:LIVES_MAX},(_,i)=>
      `<span class="heart${i>=state.lives?' lost':''}">❤️</span>`).join('');
}

function loseLife() {
  state.lives--;
  renderLives();
  if (state.lives<=0) { stopTimer(); setTimeout(showGameOver, 600); }
}

function startTimer() {
  stopTimer();
  state.timerVal = TIMER_MAX;
  updateTimerUI();
  state.timerInterval = setInterval(()=>{
    state.timerVal--;
    updateTimerUI();
    if (state.timerVal<=0) { stopTimer(); if (!state.answered) timeUp(); }
  }, 1000);
}
function stopTimer() { clearInterval(state.timerInterval); state.timerInterval=null; }
function updateTimerUI() {
  const arc=document.getElementById('timerArc'), num=document.getElementById('timerNum');
  const pct=state.timerVal/TIMER_MAX;
  arc.style.strokeDashoffset = 113*(1-pct);
  const c = pct>0.5?'var(--green)':pct>0.25?'var(--yellow)':'var(--accent)';
  arc.style.stroke=c; num.textContent=state.timerVal; num.style.color=c;
}
function timeUp() {
  if (state.answered) return;
  state.answered=true; state.streak=0;
  showReaction('⏰');
  const q=state.questions[state.current];
  for (let i=0;i<q.blanks.length;i++) {
    const f=document.getElementById(`blank_${i}`);
    if(f){f.value=q.blanks[i];f.className='blank-field revealed';f.disabled=true;}
  }
  document.getElementById('feedbackMsg').textContent="⏰ Time's up!";
  document.getElementById('feedbackMsg').className='feedback-msg wrong';
  document.getElementById('explanationBox').innerHTML=q.explanation;
  document.getElementById('explanationBox').classList.add('show');
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('qCard').classList.add('wrong-anim');
  loseLife(); updateHud();
}

function renderQuestion() {
  if (state.current>=state.questions.length) { showGameOver(); return; }
  const q=state.questions[state.current];
  state.answered=false;
  state.selectedBlanks=new Array(q.blanks.length).fill('');
  const color=STRATEGY_COLORS[q.strategy]||'#ff6b6b';
  document.getElementById('qCard').style.setProperty('--strategy-color',color);
  document.getElementById('qCard').className='q-card';
  const badge=document.getElementById('stratBadge');
  badge.textContent=q.strategy;
  badge.style.background=color+'33';
  badge.style.color=color;
  badge.style.border=`1px solid ${color}66`;
  document.getElementById('qProgress').textContent=`Question ${state.current+1} of ${state.questions.length}`;
  let bi=0;
  let html=q.template.replace(/___/g,()=>{
    const i=bi++;
    return `<input class="blank-field" id="blank_${i}" data-idx="${i}" type="text" placeholder="?" autocomplete="off" spellcheck="false" oninput="onInput(${i},this.value)" onkeydown="onKeydown(event)" />`;
  });
  document.getElementById('qText').innerHTML=html;
  const shuffled=[...q.wordBank].sort(()=>Math.random()-0.5);
  document.getElementById('wordBank').innerHTML=shuffled.map(w=>
    `<div class="word-chip" data-word="${w}" onclick="clickWord('${w}')">${w}</div>`).join('');
  document.getElementById('hintText').textContent=q.hint;
  document.getElementById('hintText').classList.remove('show');
  document.getElementById('feedbackMsg').className='feedback-msg';
  document.getElementById('explanationBox').className='explanation-box';
  document.getElementById('checkBtn').style.display='inline-block';
  document.getElementById('nextBtn').style.display='none';
  updateHud(); startTimer();
  setTimeout(()=>{const b=document.getElementById('blank_0');if(b)b.focus();},100);
}

function onInput(idx,val){state.selectedBlanks[idx]=val;}
function onKeydown(e){if(e.key==='Enter')checkAnswer();}
function clickWord(word){
  const q=state.questions[state.current];
  for(let i=0;i<q.blanks.length;i++){
    const f=document.getElementById(`blank_${i}`);
    if(f&&!f.value){f.value=word;state.selectedBlanks[i]=word;updateUsedChips();return;}
  }
}
function updateUsedChips(){
  const used=state.selectedBlanks.filter(Boolean).map(w=>w.toLowerCase());
  document.querySelectorAll('.word-chip').forEach(c=>{
    c.classList.toggle('used',used.includes(c.dataset.word.toLowerCase()));
  });
}
function showHint(){
  state.score=Math.max(0,state.score-3);
  updateHud();
  document.getElementById('hintText').classList.add('show');
}

function checkAnswer(){
  if(state.answered)return;
  stopTimer();
  const q=state.questions[state.current];
  let allCorrect=true;
  for(let i=0;i<q.blanks.length;i++){
    const f=document.getElementById(`blank_${i}`);
    const val=(f?.value||'').trim().toLowerCase();
    const correct=q.blanks[i].toLowerCase();
    if(val===correct){f.classList.add('correct');f.classList.remove('wrong');}
    else{f.classList.add('wrong');f.classList.remove('correct');allCorrect=false;}
    f.disabled=true;
  }
  state.answered=true;
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('explanationBox').innerHTML=q.explanation;
  document.getElementById('explanationBox').classList.add('show');
  if(allCorrect){
    state.streak++; state.correct++;
    const timeBonus=Math.floor(state.timerVal/TIMER_MAX*5);
    const streakBonus=state.streak>=3?5:0;
    const pts=10+timeBonus+streakBonus;
    state.score+=pts;
    document.getElementById('feedbackMsg').textContent=`+${pts}${state.streak>=3?' 🔥 STREAK!':''}`;
    document.getElementById('feedbackMsg').className='feedback-msg correct';
    document.getElementById('qCard').classList.add('correct-anim');
    showReaction(state.streak>=5?'🔥':state.streak>=3?'⚡':'✅');
    spawnScorePop(`+${pts}`);
  } else {
    state.streak=0;
    for(let i=0;i<q.blanks.length;i++){
      const f=document.getElementById(`blank_${i}`);
      if(f&&f.classList.contains('wrong')){
        f.value=q.blanks[i];f.style.borderColor='var(--purple)';f.style.color='var(--purple)';
      }
    }
    document.getElementById('feedbackMsg').textContent='✗ Answer shown';
    document.getElementById('feedbackMsg').className='feedback-msg wrong';
    document.getElementById('qCard').classList.add('wrong-anim');
    showReaction('❌');
    loseLife();
  }
  updateHud();
}

function skipQuestion(){if(state.answered)return;stopTimer();state.streak=0;state.current++;renderQuestion();}
function nextQuestion(){state.current++;renderQuestion();}

function updateHud(){
  document.getElementById('hudScore').textContent=state.score;
  const streak=document.getElementById('hudStreak');
  if(state.streak>=2){streak.textContent=`🔥 ${state.streak}x Streak!`;streak.classList.add('show');}
  else{streak.classList.remove('show');}
}

function showReaction(emoji){
  const overlay=document.getElementById('reactionOverlay'),em=document.getElementById('reactionEmoji');
  em.textContent=emoji; em.style.animation='none';
  overlay.style.display='flex';
  requestAnimationFrame(()=>{em.style.animation='reactionPop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards';});
  setTimeout(()=>{overlay.style.display='none';},700);
}
function spawnScorePop(text){
  const el=document.createElement('div');
  el.className='score-pop'; el.textContent=text; el.style.color='var(--yellow)';
  el.style.left=(40+Math.random()*20)+'%'; el.style.top='40%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function showGameOver(){
  stopTimer();
  saveLB(state.playerName,state.score);
  showScreen('gameOverScreen');
  const total=state.questions.length;
  const answered=Math.min(state.current+1,total);
  const pct=answered>0?Math.round((state.correct/answered)*100):0;
  const won=state.lives>0;
  document.getElementById('goTitle').textContent=won?'QUIZ COMPLETE! 🎉':'GAME OVER 💀';
  document.getElementById('goTitle').style.color=won?'var(--green)':'var(--accent)';
  document.getElementById('goScore').textContent=`⭐ ${state.score}`;
  document.getElementById('goStats').innerHTML=`
    <div class="go-stat"><span class="go-stat-num">${state.correct}</span><span class="go-stat-label">Correct</span></div>
    <div class="go-stat"><span class="go-stat-num">${state.lives}</span><span class="go-stat-label">Lives Left</span></div>
    <div class="go-stat"><span class="go-stat-num">${pct}%</span><span class="go-stat-label">Accuracy</span></div>`;
  renderLB('endLB',state.playerName);
}

buildFilters();
renderLB('titleLB','');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAAR Strategies Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --border: #e8d9c4;
    --text: #2d2013;
    --muted: #9a8470;
    --accent: #e05c2a;
    --accent2: #f5a623;
    --green: #2eac6d;
    --red: #e03a3a;
    --blue: #3a7bd5;
    --purple: #7c4dbd;
    --shadow: 0 4px 20px rgba(45,32,19,0.08);
    --shadow-lg: 0 8px 40px rgba(45,32,19,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(240,160,80,0.07) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(224,92,42,0.06) 0%, transparent 50%);
  }

  /* Header */
  header {
    background: var(--text);
    color: white;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .score-chip {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .score-chip span { color: var(--accent2); }

  /* Progress bar */
  .progress-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.15);
    position: sticky;
    top: 57px;
    z-index: 49;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }

  /* Main container */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }

  /* Strategy filter tabs */
  .filter-wrap {
    margin-bottom: 1.8rem;
    overflow-x: auto;
    padding-bottom: 0.4rem;
    -webkit-overflow-scrolling: touch;
  }

  .filter-tabs {
    display: flex;
    gap: 0.5rem;
    white-space: nowrap;
  }

  .filter-tab {
    background: white;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.35rem 0.85rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.03em;
  }

  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 1.8rem;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--strategy-color, var(--accent));
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }

  .strategy-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.25rem 0.7rem;
    border-radius: 6px;
    background: var(--strategy-color, var(--accent));
    color: white;
    letter-spacing: 0.05em;
  }

  .q-num {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 600;
    margin-left: auto;
  }

  .q-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 1.4rem;
    color: var(--text);
  }

  /* Blank input */
  .blank-input {
    display: inline-block;
    position: relative;
  }

  .blank-field {
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    background: #fdf0e2;
    border: 2px solid var(--accent2);
    border-radius: 8px;
    padding: 0.2rem 0.6rem;
    min-width: 120px;
    text-align: center;
    outline: none;
    transition: all 0.2s;
  }

  .blank-field:focus {
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 3px rgba(224,92,42,0.15);
  }

  .blank-field.correct {
    border-color: var(--green);
    background: #edfaf4;
    color: var(--green);
  }

  .blank-field.wrong {
    border-color: var(--red);
    background: #fef0f0;
    color: var(--red);
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  /* Word bank */
  .word-bank-label {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .word-chip {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.75rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }

  .word-chip:hover {
    border-color: var(--accent2);
    background: #fff8ee;
    color: var(--accent);
    transform: translateY(-1px);
  }

  .word-chip.used {
    opacity: 0.3;
    pointer-events: none;
    text-decoration: line-through;
  }

  /* Hint */
  .hint-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }

  .hint-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
  }

  .hint-btn:hover { border-color: var(--blue); color: var(--blue); }

  .hint-text {
    font-size: 0.82rem;
    color: var(--blue);
    font-style: italic;
    display: none;
  }

  .hint-text.show { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Action row */
  .action-row {
    display: flex;
    gap: 0.8rem;
    align-items: center;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.88rem;
    padding: 0.65rem 1.5rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.02em;
  }

  .btn-check {
    background: var(--accent);
    color: white;
    box-shadow: 0 3px 10px rgba(224,92,42,0.3);
  }

  .btn-check:hover { background: #c9491e; transform: translateY(-1px); }

  .btn-skip {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
  }

  .btn-skip:hover { border-color: var(--muted); color: var(--text); }

  .btn-next {
    background: var(--green);
    color: white;
    box-shadow: 0 3px 10px rgba(46,172,109,0.3);
    display: none;
  }

  .btn-next:hover { background: #25955e; transform: translateY(-1px); }

  /* Feedback */
  .feedback {
    font-size: 0.88rem;
    font-weight: 700;
    margin-left: auto;
    display: none;
  }

  .feedback.correct { color: var(--green); display: block; }
  .feedback.wrong { color: var(--red); display: block; }

  /* Explanation box */
  .explanation {
    margin-top: 1.2rem;
    background: #f0faf5;
    border: 1.5px solid #b7e8d0;
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    font-size: 0.85rem;
    color: #1a6b44;
    line-height: 1.55;
    display: none;
  }

  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  .explanation strong { font-weight: 800; }

  /* End screen */
  .end-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    animation: slideUp 0.4s ease;
  }

  .end-screen.show { display: block; }

  .end-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 1rem;
  }

  .end-title {
    font-family: 'Space Mono', monospace;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .end-sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }

  .end-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .end-stat {
    text-align: center;
  }

  .end-stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }

  .end-stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 700;
  }

  .btn-restart {
    background: var(--text);
    color: white;
    font-size: 0.95rem;
    padding: 0.8rem 2rem;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .btn-restart:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  /* Responsive */
  @media (max-width: 500px) {
    .q-card { padding: 1.3rem; }
    .blank-field { min-width: 90px; font-size: 0.85rem; }
    header { padding: 1rem 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">STAAR <span>Strategies</span> Quiz</div>
  <div class="header-right">
    <div class="score-chip">Score: <span id="scoreDisplay">0</span></div>
    <div class="score-chip">Q: <span id="qDisplay">1</span> / <span id="totalDisplay">0</span></div>
  </div>
</header>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div class="container">
  <div class="filter-wrap">
    <div class="filter-tabs" id="filterTabs"></div>
  </div>

  <div id="quizArea">
    <div class="q-card" id="qCard">
      <div class="q-meta">
        <div class="strategy-badge" id="stratBadge"></div>
        <div class="q-num" id="qNum"></div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="word-bank-label">Word Bank</div>
      <div class="word-bank" id="wordBank"></div>
      <div class="hint-row">
        <button class="hint-btn" onclick="showHint()">💡 Hint</button>
        <span class="hint-text" id="hintText"></span>
      </div>
      <div class="action-row">
        <button class="btn btn-check" id="checkBtn" onclick="checkAnswer()">Check</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">Next →</button>
        <button class="btn btn-skip" onclick="skipQuestion()">Skip</button>
        <span class="feedback" id="feedback"></span>
      </div>
      <div class="explanation" id="explanation"></div>
    </div>
  </div>

  <div class="end-screen" id="endScreen">
    <span class="end-emoji" id="endEmoji">🎉</span>
    <div class="end-title">Quiz Complete!</div>
    <div class="end-sub" id="endSub"></div>
    <div class="end-stats">
      <div class="end-stat"><span class="end-stat-num" id="endScore">0</span><span class="end-stat-label">Score</span></div>
      <div class="end-stat"><span class="end-stat-num" id="endCorrect">0</span><span class="end-stat-label">Correct</span></div>
      <div class="end-stat"><span class="end-stat-num" id="endPct">0%</span><span class="end-stat-label">Accuracy</span></div>
    </div>
    <button class="btn-restart" onclick="restart()">Play Again</button>
  </div>
</div>

<script>
const STRATEGY_COLORS = {
  "MIND MAP": "#3a7bd5",
  "SWBST":    "#e05c2a",
  "DATE":     "#7c4dbd",
  "SIFT":     "#2eac6d",
  "SDDS":     "#d4a017",
  "RISE UP":  "#e03a3a",
  "SALT":     "#f5a623",
  "TEXT":     "#00897b",
  "IBBC":     "#c2185b",
};

const ALL_QUESTIONS = [
  // MIND MAP
  { strategy: "MIND MAP", type: "informational",
    template: "When reading informational text, the MIND MAP strategy helps you identify the ___ topic and important ___ in each section.",
    blanks: ["main", "details"],
    wordBank: ["main", "details", "title", "paragraphs", "headings", "ideas"],
    hint: "Think about what the whole text is mostly about, and what supports it.",
    explanation: "MIND MAP = identify the <strong>main</strong> topic in the center, then branch out the <strong>details</strong> from each section or subheading." },

  { strategy: "MIND MAP", type: "informational",
    template: "In MIND MAP, subheadings branch off the ___ topic, and each branch can have its own important ___.",
    blanks: ["main", "idea"],
    wordBank: ["main", "idea", "paragraph", "theme", "summary", "title"],
    hint: "The center of a mind map holds the big picture.",
    explanation: "The <strong>main</strong> topic sits at the center; each subheading branches off with its own supporting <strong>idea</strong>." },

  // SWBST
  { strategy: "SWBST", type: "literary",
    template: "SWBST stands for Somebody, Wanted, But, ___, Then.",
    blanks: ["So"],
    wordBank: ["So", "Since", "Still", "See", "Start"],
    hint: "It's the step after 'But' — what happens as a result of the conflict?",
    explanation: "SWBST = Somebody / Wanted / But / <strong>So</strong> / Then — it traces a character's goal, conflict, consequence, and resolution." },

  { strategy: "SWBST", type: "literary",
    template: "In SWBST, the 'But' column describes the ___ or problem that gets in the character's way.",
    blanks: ["conflict"],
    wordBank: ["conflict", "solution", "theme", "setting", "climax", "mood"],
    hint: "The 'but' is what stops the character from getting what they want.",
    explanation: "The <strong>conflict</strong> is the obstacle or problem — SWBST captures it in the 'But' column." },

  { strategy: "SWBST", type: "literary",
    template: "The 'Then' in SWBST describes the ___ or outcome after the conflict is resolved.",
    blanks: ["resolution"],
    wordBank: ["resolution", "climax", "flashback", "theme", "foreshadowing", "mood"],
    hint: "This is how the story ends or what finally happens.",
    explanation: "The <strong>resolution</strong> is the story's outcome — what happens after the conflict is dealt with in the 'So' step." },

  // DATE
  { strategy: "DATE", type: "literary",
    template: "DATE stands for Dialogue, Actions, Thoughts and tone, and ___.",
    blanks: ["Emotions"],
    wordBank: ["Emotions", "Evidence", "Examples", "Events", "Effects", "Explanations"],
    hint: "The last letter is inferred from what characters say and do.",
    explanation: "DATE = <strong>D</strong>ialogue / <strong>A</strong>ctions / <strong>T</strong>houghts and tone / <strong>E</strong>motions — all used to analyze characters." },

  { strategy: "DATE", type: "literary",
    template: "In the DATE strategy, you infer a character's ___ from their actions and dialogues.",
    blanks: ["emotions"],
    wordBank: ["emotions", "setting", "theme", "plot", "conflict", "structure"],
    hint: "Authors don't always tell you how a character feels — you have to figure it out.",
    explanation: "The E in DATE stands for <strong>emotions</strong>, which readers must infer from what characters say and do." },

  // SIFT
  { strategy: "SIFT", type: "poems",
    template: "SIFT stands for Structure, Imagery, Figurative Language, and ___.",
    blanks: ["Theme and Tone"],
    wordBank: ["Theme and Tone", "Text Evidence", "Topic and Title", "Thoughts and Tone"],
    hint: "The last letter asks: What is the speaker's message and attitude?",
    explanation: "SIFT = <strong>S</strong>tructure / <strong>I</strong>magery / <strong>F</strong>igurative Language / <strong>T</strong>heme and Tone — the four lenses for analyzing poetry." },

  { strategy: "SIFT", type: "poems",
    template: "When using SIFT, the 'I' asks you to find details that appeal to the five ___.",
    blanks: ["senses"],
    wordBank: ["senses", "stanzas", "syllables", "speakers", "structures", "symbols"],
    hint: "See, hear, taste, smell, feel.",
    explanation: "The <strong>I</strong> in SIFT = Imagery — language that helps readers experience things through their five <strong>senses</strong>." },

  { strategy: "SIFT", type: "poems",
    template: "In SIFT, the 'S' for Structure asks you to notice line breaks, stanzas, and ___ choices the author made.",
    blanks: ["punctuation"],
    wordBank: ["punctuation", "rhyme scheme", "meter", "symbolism", "alliteration", "diction"],
    hint: "Look at how the poem is physically arranged on the page.",
    explanation: "The <strong>S</strong>tructure in SIFT includes analyzing line breaks, stanzas, capitalization, repetition, and <strong>punctuation</strong>." },

  // SDDS
  { strategy: "SDDS", type: "drama",
    template: "SDDS stands for Stage Directions, ___, Dialogue, and Setting.",
    blanks: ["Directions"],
    wordBank: ["Directions", "Details", "Descriptions", "Diction", "Drama", "Devices"],
    hint: "Wait — check the acronym again. What does each letter stand for?",
    explanation: "SDDS = <strong>S</strong>tage Directions / <strong>D</strong>ialogue / <strong>D</strong>etails… actually: Stage Directions, Dialogue, and Setting — used to read drama." },

  { strategy: "SDDS", type: "drama",
    template: "When reading drama, SDDS tells you to highlight the ___ of the scene, like 'SCENE 1. In an old abandoned house...'",
    blanks: ["setting"],
    wordBank: ["setting", "conflict", "theme", "climax", "tone", "mood"],
    hint: "This tells you when and where the scene takes place.",
    explanation: "The second <strong>S</strong> in SDDS = <strong>Setting</strong> — always highlight and visualize where and when the drama takes place." },

  { strategy: "SDDS", type: "drama",
    template: "Stage directions in drama are usually written in ___ and describe what characters physically do.",
    blanks: ["parentheses"],
    wordBank: ["parentheses", "quotation marks", "bold", "italics", "brackets", "all caps"],
    hint: "Example: (She sits calmly)",
    explanation: "<strong>Parentheses</strong> are used for stage directions — e.g., (She sits calmly). These describe character actions not spoken aloud." },

  // RISE UP
  { strategy: "RISE UP", type: "test process",
    template: "The first step in RISE UP is to ___ and annotate the text before answering questions.",
    blanks: ["read"],
    wordBank: ["read", "highlight", "skim", "summarize", "rewrite", "scan"],
    hint: "You can't answer well if you haven't done this first.",
    explanation: "RISE UP begins with <strong>Read</strong> and annotate — always actively engage with the text before moving to the questions." },

  { strategy: "RISE UP", type: "test process",
    template: "In RISE UP, after searching for text evidence, you should ___ wrong answer choices before picking the best one.",
    blanks: ["eliminate"],
    wordBank: ["eliminate", "circle", "rewrite", "underline", "ignore", "guess"],
    hint: "Cross off what can't be right first.",
    explanation: "The E in RISE UP = <strong>Eliminate</strong> wrong choices — process of elimination helps you pick the strongest answer." },

  { strategy: "RISE UP", type: "test process",
    template: "RISE UP says to use the ___ when you're unsure about a question, so you can come back to it.",
    blanks: ["flag"],
    wordBank: ["flag", "process", "timer", "highlighter", "pencil", "eraser"],
    hint: "It's a tool on the STAAR digital test that marks the question for review.",
    explanation: "The U in RISE UP = Use the <strong>flag</strong> — mark uncertain questions and revisit them rather than wasting time." },

  // SALT
  { strategy: "SALT", type: "highlighting",
    template: "SALT stands for Special Word, Action, ___, and Topic.",
    blanks: ["Location"],
    wordBank: ["Location", "Literature", "Language", "Lines", "Literal", "Logic"],
    hint: "The L asks: Where in the text can I find the answer?",
    explanation: "SALT = Special Word / Action / <strong>Location</strong> / Topic — Location asks which paragraphs or lines to look in for evidence." },

  { strategy: "SALT", type: "highlighting",
    template: "In SALT, the 'S' (Special Word) tells you to watch for words like '___ ', 'Select TWO', or 'only' in a question.",
    blanks: ["except"],
    wordBank: ["except", "always", "never", "mostly", "mainly", "often"],
    hint: "This word flips the question — instead of what IS true, it asks what is NOT true.",
    explanation: "The word <strong>except</strong> is a key Special Word — it changes the whole direction of the question, so you must notice it." },

  { strategy: "SALT", type: "highlighting",
    template: "The 'T' in SALT stands for ___, which is the 'heart' of what the question is really asking.",
    blanks: ["Topic"],
    wordBank: ["Topic", "Tone", "Theme", "Thesis", "Text", "Title"],
    hint: "Ask yourself: what is this question actually about?",
    explanation: "The <strong>T</strong>opic is the core focus of the question — identifying it helps you search the right part of the text for evidence." },

  // TEXT
  { strategy: "TEXT", type: "writing (SCR)",
    template: "In the TEXT strategy for SCR, the 'E' stands for ___, where you cite sentences from the text.",
    blanks: ["Evidence"],
    wordBank: ["Evidence", "Explanation", "Example", "Effect", "Elaboration", "Emphasis"],
    hint: "Use 'According to...' to introduce it.",
    explanation: "The <strong>E</strong> in TEXT = <strong>Evidence</strong> — you quote or cite directly from the text using 'According to...' to support your thesis." },

  { strategy: "TEXT", type: "writing (SCR)",
    template: "The second 'X' in TEXT stands for Explanation, where you say 'This ___...' to connect evidence to your thesis.",
    blanks: ["means"],
    wordBank: ["means", "shows", "proves", "tells", "supports", "states"],
    hint: "It's the phrase starter that begins your explanation.",
    explanation: "The Explanation step uses the phrase 'This <strong>means</strong>...' to connect evidence back to your thesis statement." },

  { strategy: "TEXT", type: "writing (SCR)",
    template: "The final 'T' in TEXT tells you to ___ or paraphrase your thesis using 'Therefore...'",
    blanks: ["restate"],
    wordBank: ["restate", "introduce", "replace", "summarize", "copy", "expand"],
    hint: "You're saying your main idea again, just in new words.",
    explanation: "The last T = Thesis <strong>Restated</strong> — wrap your SCR by restating your thesis using 'Therefore...' in your own words." },

  // IBBC
  { strategy: "IBBC", type: "writing (ECR)",
    template: "IBBC stands for Introduction, Body 1, Body 2, and ___.",
    blanks: ["Conclusion"],
    wordBank: ["Conclusion", "Claim", "Commentary", "Connection", "Context", "Counterclaim"],
    hint: "It's the final paragraph of your essay.",
    explanation: "IBBC = Introduction / Body 1 / Body 2 / <strong>Conclusion</strong> — the four-paragraph structure for an ECR essay." },

  { strategy: "IBBC", type: "writing (ECR)",
    template: "In the IBBC Introduction, your hook should be a ___ — a comparison using 'like' or 'as'.",
    blanks: ["simile"],
    wordBank: ["simile", "metaphor", "hyperbole", "alliteration", "theme", "claim"],
    hint: "It's a specific type of figurative language that compares two things.",
    explanation: "The IBBC hook is a <strong>simile</strong> — a comparison using 'like' or 'as' to grab the reader's attention." },

  { strategy: "IBBC", type: "writing (ECR)",
    template: "Each body paragraph in IBBC must include a topic sentence, evidence, and at least ___ sentences of explanation.",
    blanks: ["2"],
    wordBank: ["2", "1", "3", "4", "5", "6"],
    hint: "The IBBC guide says 'at least' this many.",
    explanation: "IBBC requires at least <strong>2</strong> sentences of explanation or examples per body paragraph to earn full credit." },

  { strategy: "IBBC", type: "writing (ECR)",
    template: "In IBBC, the ___ paragraph ends with a thesis restated and a final thought (question or statement).",
    blanks: ["Conclusion"],
    wordBank: ["Conclusion", "Introduction", "Body 1", "Body 2", "Hook", "Evidence"],
    hint: "It's the last paragraph — what wraps the whole essay up?",
    explanation: "The <strong>Conclusion</strong> restates the thesis and ends with a final thought, closing out the ECR essay." },
];

let state = {
  filter: "All",
  questions: [],
  current: 0,
  score: 0,
  correct: 0,
  answered: false,
  selectedBlanks: [],
};

function getFilteredQuestions() {
  let q = state.filter === "All" ? [...ALL_QUESTIONS] : ALL_QUESTIONS.filter(q => q.strategy === state.filter);
  return q.sort(() => Math.random() - 0.5);
}

function buildFilterTabs() {
  const tabs = document.getElementById('filterTabs');
  const strategies = ["All", ...Object.keys(STRATEGY_COLORS)];
  tabs.innerHTML = strategies.map(s =>
    `<button class="filter-tab${s === state.filter ? ' active' : ''}" onclick="setFilter('${s}')">${s}</button>`
  ).join('');
}

function setFilter(f) {
  state.filter = f;
  buildFilterTabs();
  restart();
}

function restart() {
  state.questions = getFilteredQuestions();
  state.current = 0;
  state.score = 0;
  state.correct = 0;
  state.answered = false;
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  document.getElementById('scoreDisplay').textContent = 0;
  document.getElementById('totalDisplay').textContent = state.questions.length;
  renderQuestion();
}

function renderQuestion() {
  if (state.current >= state.questions.length) { showEnd(); return; }

  const q = state.questions[state.current];
  state.answered = false;
  state.selectedBlanks = new Array(q.blanks.length).fill('');

  // Style
  const color = STRATEGY_COLORS[q.strategy] || '#e05c2a';
  document.getElementById('qCard').style.setProperty('--strategy-color', color);
  document.getElementById('stratBadge').textContent = q.strategy;
  document.getElementById('stratBadge').style.background = color;
  document.getElementById('qNum').textContent = `Question ${state.current + 1} of ${state.questions.length}`;
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('qDisplay').textContent = state.current + 1;

  // Progress
  const pct = (state.current / state.questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  // Build question HTML with blank inputs
  let blankIdx = 0;
  let html = q.template.replace(/___/g, () => {
    const i = blankIdx++;
    return `<span class="blank-input"><input class="blank-field" id="blank_${i}" data-idx="${i}" type="text" placeholder="?" autocomplete="off" spellcheck="false" oninput="onBlankInput(${i}, this.value)" /></span>`;
  });
  document.getElementById('qText').innerHTML = html;

  // Word bank
  const wb = document.getElementById('wordBank');
  const shuffled = [...q.wordBank].sort(() => Math.random() - 0.5);
  wb.innerHTML = shuffled.map(w =>
    `<div class="word-chip" data-word="${w}" onclick="clickWord('${w}')">${w}</div>`
  ).join('');

  // Hint
  document.getElementById('hintText').textContent = q.hint;
  document.getElementById('hintText').classList.remove('show');

  // Buttons
  document.getElementById('checkBtn').style.display = 'inline-block';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';

  // Focus first blank
  setTimeout(() => { const b = document.getElementById('blank_0'); if (b) b.focus(); }, 100);
}

function onBlankInput(idx, val) {
  state.selectedBlanks[idx] = val;
}

function clickWord(word) {
  // Fill the first empty blank
  const q = state.questions[state.current];
  for (let i = 0; i < q.blanks.length; i++) {
    const field = document.getElementById(`blank_${i}`);
    if (field && !field.value) {
      field.value = word;
      state.selectedBlanks[i] = word;
      // Mark chip used if all blanks filled with this word
      updateUsedChips();
      return;
    }
  }
}

function updateUsedChips() {
  const used = state.selectedBlanks.filter(Boolean).map(w => w.toLowerCase());
  document.querySelectorAll('.word-chip').forEach(c => {
    c.classList.toggle('used', used.includes(c.dataset.word.toLowerCase()));
  });
}

function checkAnswer() {
  if (state.answered) return;
  const q = state.questions[state.current];

  let allCorrect = true;
  for (let i = 0; i < q.blanks.length; i++) {
    const field = document.getElementById(`blank_${i}`);
    const val = (field?.value || '').trim().toLowerCase();
    const correct = q.blanks[i].toLowerCase();
    if (val === correct) {
      field.classList.add('correct');
      field.classList.remove('wrong');
    } else {
      field.classList.add('wrong');
      field.classList.remove('correct');
      allCorrect = false;
    }
    field.disabled = true;
  }

  state.answered = true;

  const fb = document.getElementById('feedback');
  if (allCorrect) {
    state.score += 10;
    state.correct++;
    fb.textContent = '✓ Correct! +10';
    fb.className = 'feedback correct';
  } else {
    fb.textContent = `✗ Answer: ${q.blanks.join(', ')}`;
    fb.className = 'feedback wrong';
    // Show correct answers in fields
    for (let i = 0; i < q.blanks.length; i++) {
      const field = document.getElementById(`blank_${i}`);
      if (field && field.classList.contains('wrong')) {
        field.value = q.blanks[i];
        field.classList.remove('wrong');
        field.style.borderColor = '#f5a623';
        field.style.background = '#fff8ee';
        field.style.color = '#c47d00';
      }
    }
  }

  document.getElementById('explanation').innerHTML = q.explanation;
  document.getElementById('explanation').classList.add('show');
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('scoreDisplay').textContent = state.score;
}

function skipQuestion() {
  if (state.answered) return;
  state.current++;
  renderQuestion();
}

function nextQuestion() {
  state.current++;
  renderQuestion();
}

function showHint() {
  document.getElementById('hintText').classList.add('show');
}

function showEnd() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  const total = state.questions.length;
  const pct = total > 0 ? Math.round((state.correct / total) * 100) : 0;
  document.getElementById('endScore').textContent = state.score;
  document.getElementById('endCorrect').textContent = `${state.correct}/${total}`;
  document.getElementById('endPct').textContent = pct + '%';
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '💪' : '📚';
  document.getElementById('endEmoji').textContent = emoji;
  const msg = pct >= 90 ? "Outstanding! You know your strategies cold." : pct >= 70 ? "Great work! A little more review and you've got this." : pct >= 50 ? "Good effort — keep practicing those strategies!" : "Keep studying — you'll get there!";
  document.getElementById('endSub').textContent = msg;
  document.getElementById('endScreen').classList.add('show');
}

// Init
buildFilterTabs();
restart();
</script>
</body>
</html>
